<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Sign inventory — field</title>
<!-- iOS "Add to Home Screen" standalone app -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sign inventory">
<meta name="theme-color" content="#1e6fff">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  #map { position: absolute; inset: 0; }
  .count-marker { border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 3px rgba(0,0,0,.5);
    color: #fff; font: 600 12px sans-serif; text-align: center;
    text-shadow: 0 0 2px #000, 0 0 2px #000; }
  .user-loc { pointer-events: none; }  /* location dot/ring never intercept taps */
  .legend { background: #fff; padding: 8px 10px; border-radius: 4px; font: 12px sans-serif;
    line-height: 1.6; box-shadow: 0 1px 4px rgba(0,0,0,.3); max-width: 60vw; }
  .legend i { display: inline-block; width: 12px; height: 12px; border-radius: 50%;
    margin-right: 6px; vertical-align: -1px; border: 1px solid #fff; }
  .legend button { font: 11px sans-serif; margin-top: 6px; cursor: pointer; }
  .legend-hint { font: italic 10px sans-serif; color: #888; margin: 1px 0 3px; }
  .legend-head { cursor: pointer; user-select: none; display: flex; align-items: center;
    justify-content: space-between; gap: 14px; }
  .legend-caret { font-size: 10px; color: #888; }
  .legend.collapsed .legend-body { display: none; }
  .popup-title { font: 600 13px sans-serif; margin-bottom: 6px; }
  .popup-scroll { display: flex; gap: 12px; overflow-x: auto; overflow-y: hidden; padding-bottom: 6px; }
  .popup-item { flex: 0 0 auto; width: 160px; }
  .popup-img { width: 150px; height: 150px; object-fit: cover; border-radius: 4px; display: block; }
  .popup-img-wrap { position: relative; width: 150px; }
  .img-del { position: absolute; top: 3px; right: 3px; width: 22px; height: 22px; padding: 0;
    border: 2px solid #fff; border-radius: 50%; background: #e6194b; color: #fff;
    font: 700 14px/1 sans-serif; cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.45); }
  .popup-meta { font: 12px sans-serif; color: #555; }
  .arrow svg { display: block; margin: 0 auto 4px; }
  .sel-row { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
  .sel-label { font: 600 10px sans-serif; color: #666; width: 34px; flex: 0 0 auto; }
  .sel { flex: 1; min-width: 0; font: 12px sans-serif; padding: 2px 4px; border: 1px solid #ccc;
    border-radius: 3px; background: #fff; color: #222; }
  .zoom-lens { position: fixed; pointer-events: none; display: none; z-index: 10000;
    width: 260px; height: 260px; border: 2px solid #fff; border-radius: 6px;
    background-color: #000; background-repeat: no-repeat; box-shadow: 0 2px 10px rgba(0,0,0,.6); }
  /* Floating action buttons */
  .fab { position: absolute; right: 14px; z-index: 1000; border: none; border-radius: 50%;
    width: 56px; height: 56px; box-shadow: 0 2px 8px rgba(0,0,0,.4); cursor: pointer;
    font-size: 24px; display: flex; align-items: center; justify-content: center; }
  .fab-capture { bottom: calc(24px + env(safe-area-inset-bottom)); background: #1e6fff; color: #fff; font-size: 30px; }
  .fab-locate { bottom: calc(92px + env(safe-area-inset-bottom)); background: #fff; color: #1e6fff; font-size: 22px; }
  .toast { position: absolute; left: 50%; bottom: calc(96px + env(safe-area-inset-bottom)); transform: translateX(-50%);
    background: rgba(0,0,0,.82); color: #fff; font: 13px sans-serif; padding: 8px 14px;
    border-radius: 18px; z-index: 1500; opacity: 0; transition: opacity .25s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .banner { position: absolute; top: calc(10px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    z-index: 1200; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,.3); border-radius: 8px;
    padding: 10px 14px; font: 13px sans-serif; display: none; align-items: center; gap: 10px; max-width: 90vw; }
  .banner button { font: 12px sans-serif; padding: 5px 10px; cursor: pointer; }
  /* Help modal */
  .help-overlay { position: fixed; inset: 0; z-index: 11000; display: none; background: rgba(0,0,0,.5); }
  .help-overlay.open { display: flex; align-items: center; justify-content: center; }
  .help-modal { background: #fff; width: min(560px, 92vw); max-height: 84vh; overflow-y: auto;
    border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,.4); padding: 20px 24px;
    font: 13px/1.55 sans-serif; color: #222; }
  .help-modal h2 { margin: 0 0 4px; font-size: 18px; }
  .help-modal h3 { margin: 16px 0 6px; font-size: 14px; color: #1e6fff; }
  .help-modal ul { margin: 6px 0; padding-left: 20px; }
  .help-modal code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  .help-swatch { display: inline-block; width: 12px; height: 12px; border-radius: 50%;
    margin-right: 5px; vertical-align: -1px; border: 1px solid #fff; box-shadow: 0 0 1px #999; }
  .help-close { float: right; border: none; background: #eee; border-radius: 4px;
    width: 26px; height: 26px; font-size: 16px; cursor: pointer; }
</style>
</head>
<body>
<div id="map"></div>

<div class="banner" id="banner">
  <span id="bannerText">No signs yet. Import your seed file to get started.</span>
  <button onclick="pickImport()">Import…</button>
</div>

<button class="fab fab-locate" id="locateBtn" title="Center on my location">◎</button>
<button class="fab fab-capture" id="captureBtn" title="Add a sign here">＋</button>
<div class="toast" id="toast"></div>

<!-- hidden inputs -->
<input id="cameraInput" type="file" accept="image/*" capture="environment" style="display:none">
<input id="importInput" type="file" accept="application/json,.json,application/zip,.zip" style="display:none">

<script>
"use strict";

// ---- Config (mirrors build_map.py) -----------------------------------------
const STATES = ["todo", "good", "review", "replace"];
const STATE_COLOR = { todo: "#9e9e9e", good: "#2ca25f", review: "#f59e0b", replace: "#e6194b" };
// Object type is independent of review state (an inventory has more than signs).
const OBJECT_TYPES = ["unknown", "sign", "pavement", "fencing", "ev charger"];
const RELIABILITY_COLOR = { good: "#2ca25f", suspect: "#f59e0b", bad: "#e6194b", unknown: "#888888" };
const THUMB_WIDTH = 720, THUMB_QUALITY = 0.75;
// Live-GPS accuracy (metres) -> reliability, replacing the old EXIF "lag" metric.
const ACC_GOOD_M = 10, ACC_SUSPECT_M = 25;
const LAG_SUSPECT_S = 5, LAG_BAD_S = 15;  // capture-time minus GPS-fix-time, seconds
const activeStates = new Set(STATES);
const activeTypes = new Set(OBJECT_TYPES);  // independent object-type filter

// ---- IndexedDB store --------------------------------------------------------
const DB_NAME = "signInventory", STORE = "signs";
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => req.result.createObjectStore(STORE, { keyPath: "id" });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
let db;
function tx(mode) { return db.transaction(STORE, mode).objectStore(STORE); }
function dbGetAll() {
  return new Promise((res, rej) => { const r = tx("readonly").getAll(); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); });
}
function dbPut(rec) {
  return new Promise((res, rej) => { const r = tx("readwrite").put(rec); r.onsuccess = () => res(); r.onerror = () => rej(r.error); });
}
function dbPutMany(recs) {
  return new Promise((res, rej) => {
    const store = tx("readwrite"); let i = 0;
    store.transaction.oncomplete = () => res();
    store.transaction.onerror = () => rej(store.transaction.error);
    (function next() { if (i < recs.length) { const r = store.put(recs[i++]); r.onsuccess = next; } })();
  });
}

// ---- Map --------------------------------------------------------------------
const map = L.map("map", { zoomControl: false });  // pinch-zoom only
const sat = L.tileLayer(
  "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  { maxZoom: 21, maxNativeZoom: 19, attribution: "Tiles © Esri" });
const road = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
  { maxZoom: 19, attribution: "© OpenStreetMap" });
sat.addTo(map);
// Base-map switch (driven by the toggle in the review-state panel).
function setBase(which) {
  if (which === "road") { if (map.hasLayer(sat)) map.removeLayer(sat); if (!map.hasLayer(road)) road.addTo(map); }
  else { if (map.hasLayer(road)) map.removeLayer(road); if (!map.hasLayer(sat)) sat.addTo(map); }
}
map.setView([33.4, -112.0], 12);

const markerLayer = L.featureGroup().addTo(map);
const groups = {};          // coordKey -> { latlng, feats:[rec], marker }
const signsById = {};       // id -> rec
const groupOfId = {};       // id -> group

const coordKey = (lat, lon) => lat.toFixed(6) + "," + lon.toFixed(6);
function getState(rec) { return rec.state || "todo"; }
function getType(rec) { return rec.object_type || "unknown"; }
// A record shows only if it passes BOTH the (independent) state and type filters.
function passesFilter(f) { return activeStates.has(getState(f)) && activeTypes.has(getType(f)); }
function visibleFeats(g) { return g.feats.filter(passesFilter); }

// ---- Marker rendering (ported from build_map.py) ---------------------------
function arrowSvg(deg, color) {
  if (deg == null) return `<div class="popup-meta">dir&nbsp;?</div>`;
  return `<div class="arrow"><svg width="34" height="34" viewBox="0 0 34 34" style="transform:rotate(${deg}deg)">` +
    `<line x1="17" y1="17" x2="17" y2="6" stroke="${color}" stroke-width="3.5"/>` +
    `<polygon points="17,2 11,13 23,13" fill="${color}"/>` +
    `<circle cx="17" cy="17" r="3.5" fill="${color}" stroke="#fff" stroke-width="1.5"/></svg></div>`;
}
function accColor(m) {
  if (m == null) return RELIABILITY_COLOR.unknown;
  if (m <= ACC_GOOD_M) return RELIABILITY_COLOR.good;
  if (m <= ACC_SUSPECT_M) return RELIABILITY_COLOR.suspect;
  return RELIABILITY_COLOR.bad;
}
function lagColor(s) {
  if (s == null) return RELIABILITY_COLOR.unknown;
  if (s < LAG_SUSPECT_S) return RELIABILITY_COLOR.good;
  if (s < LAG_BAD_S) return RELIABILITY_COLOR.suspect;
  return RELIABILITY_COLOR.bad;
}
function stateIcon(g) {
  const vis = visibleFeats(g);
  const present = STATES.filter(s => vis.some(f => getState(f) === s));
  const colors = present.map(s => STATE_COLOR[s]);
  let bg;
  if (colors.length <= 1) {
    bg = colors[0] || STATE_COLOR.todo;
  } else {
    const step = 100 / colors.length;
    bg = `linear-gradient(90deg, ${colors.map((c, i) => `${c} ${i * step}% ${(i + 1) * step}%`).join(", ")})`;
  }
  const n = vis.length || g.feats.length, size = n > 1 ? 26 : 20;
  const html = `<div class="count-marker" style="background:${bg};width:${size}px;height:${size}px;line-height:${size - 4}px">${n}</div>`;
  return L.divIcon({ className: "", iconSize: [size, size], iconAnchor: [size / 2, size / 2], html });
}
function stateSelect(rec) {
  const cur = getState(rec);
  const opts = STATES.map(s => `<option value="${s}"${s === cur ? " selected" : ""}>${s}</option>`).join("");
  return `<div class="sel-row"><span class="sel-label">State</span>` +
    `<select class="sel" onchange="onSignState('${rec.id}',this.value)">${opts}</select></div>`;
}
function typeSelect(rec) {
  const cur = getType(rec);
  const opts = OBJECT_TYPES.map(t => `<option value="${t}"${t === cur ? " selected" : ""}>${t}</option>`).join("");
  return `<div class="sel-row"><span class="sel-label">Type</span>` +
    `<select class="sel" onchange="onObjectType('${rec.id}',this.value)">${opts}</select></div>`;
}
function groupPopup(g) {
  const items = g.feats.map(rec => {
    const dir = (rec.heading == null) ? "unknown" : `${rec.heading}° true`;
    const lag = (rec.lag_seconds == null) ? "?" : rec.lag_seconds + " s";
    return `<div class="popup-item">` +
      arrowSvg(rec.heading, "#1e6fff") +
      `<div><div class="popup-img-wrap"><img class="popup-img" src="${rec.image}" alt="${rec.name}" />` +
      `<button class="img-del" onclick="deleteSign('${rec.id}')" title="Remove this sign">×</button></div>` +
      `<div class="popup-meta" style="word-break:break-all">${rec.name}</div>` +
      `<div class="popup-meta">Capture direction: <b>${dir}</b></div>` +
      `<div class="popup-meta" style="color:${lagColor(rec.lag_seconds)};font-weight:600">lag ${lag}</div>` +
      stateSelect(rec) + typeSelect(rec) + `</div></div>`;
  }).join("");
  const n = g.feats.length;
  return `<div class="popup-title">${n} object${n > 1 ? "s" : ""} at this location</div>` +
    `<div class="popup-scroll">${items}</div>`;
}
function ensureMarker(g) {
  if (g.marker) { g.marker.setIcon(stateIcon(g)); return; }
  g.marker = L.marker(g.latlng, { icon: stateIcon(g) }).bindPopup(() => groupPopup(g), { maxWidth: 500 });
  markerLayer.addLayer(g.marker);
}
function refreshGroup(g) {
  const visible = visibleFeats(g).length > 0;
  if (visible) { ensureMarker(g); if (g.marker && !markerLayer.hasLayer(g.marker)) markerLayer.addLayer(g.marker); }
  else if (g.marker && markerLayer.hasLayer(g.marker)) markerLayer.removeLayer(g.marker);
}
function applyFilter() { for (const k in groups) refreshGroup(groups[k]); }
function toggleState(s, on) { on ? activeStates.add(s) : activeStates.delete(s); applyFilter(); }
function toggleType(t, on) { on ? activeTypes.add(t) : activeTypes.delete(t); applyFilter(); }
function toggleLegend(head) {
  const collapsed = head.closest(".legend").classList.toggle("collapsed");
  head.querySelector(".legend-caret").textContent = collapsed ? "▸" : "▾";
}

// Add one record to the in-memory index + map (no DB write).
function indexSign(rec) {
  signsById[rec.id] = rec;
  const key = coordKey(rec.lat, rec.lon);
  const g = groups[key] || (groups[key] = { latlng: [rec.lat, rec.lon], feats: [] });
  if (!g.feats.some(f => f.id === rec.id)) g.feats.push(rec);
  groupOfId[rec.id] = g;
  return g;
}
async function onSignState(id, s) {
  const rec = signsById[id]; if (!rec) return;
  rec.state = s;
  await dbPut(rec);
  refreshGroup(groupOfId[id]);
}
async function onObjectType(id, t) {
  const rec = signsById[id]; if (!rec) return;
  rec.object_type = t;
  await dbPut(rec);
  refreshGroup(groupOfId[id]);  // type filter may change visibility
}
// Remove a single image/sign (the × on the popup photo), with confirmation.
async function deleteSign(id) {
  const rec = signsById[id]; if (!rec) return;
  if (!confirm("Remove this image? This cannot be undone.")) return;
  await new Promise((res, rej) => { const r = tx("readwrite").delete(id); r.onsuccess = res; r.onerror = () => rej(r.error); });
  const g = groupOfId[id];
  delete signsById[id];
  delete groupOfId[id];
  if (g) {
    g.feats = g.feats.filter(f => f.id !== id);
    if (g.feats.length === 0) {
      if (g.marker) markerLayer.removeLayer(g.marker);
      delete groups[coordKey(g.latlng[0], g.latlng[1])];
      map.closePopup();
      if (!markerLayer.getLayers().length) showBanner("No signs left. Import a backup to restore.");
    } else {
      refreshGroup(g);                                  // update the count badge
      if (g.marker) g.marker.setPopupContent(groupPopup(g));  // refresh the open popup
    }
  }
  toast("Image removed");
}

// ---- Review-state / filter control (bottom-right) --------------------------
const legend = L.control({ position: "bottomleft" });
legend.onAdd = () => {
  const div = L.DomUtil.create("div", "legend");
  L.DomEvent.disableClickPropagation(div);
  L.DomEvent.disableScrollPropagation(div);
  div.innerHTML =
    `<div class="legend-head" onclick="toggleLegend(this)"><span class="legend-caret">▾</span></div>` +
    `<div class="legend-body">` +
      `<div class="legend-hint">Review state</div>` +
      STATES.map(s =>
        `<label style="cursor:pointer"><input type="checkbox" checked onchange="toggleState('${s}',this.checked)"> ` +
        `<i style="background:${STATE_COLOR[s]}"></i>${s}</label>`).join("<br>") +
      `<div class="legend-hint" style="margin-top:6px">Object type</div>` +
      OBJECT_TYPES.map(t =>
        `<label style="cursor:pointer"><input type="checkbox" checked onchange="toggleType('${t}',this.checked)"> ${t}</label>`).join("<br>") +
      `<div class="legend-hint" style="margin-top:6px">Base map</div>` +
      `<label style="cursor:pointer"><input type="radio" name="base" checked onchange="setBase('sat')"> Satellite</label><br>` +
      `<label style="cursor:pointer"><input type="radio" name="base" onchange="setBase('road')"> Road map</label><br>` +
      `<button onclick="exportBackup()">Export</button> ` +
      `<button onclick="pickImport()">Import</button>` +
      `<br><button onclick="showHelp()" style="margin-top:4px">Help</button> ` +
      `<button onclick="clearData()" style="margin-top:4px;background:#e6194b;color:#fff">Clear</button>` +
    `</div>`;
  return div;
};
legend.addTo(map);

// ---- Live location ----------------------------------------------------------
let userMarker, accuracyCircle, lastPos = null, followedOnce = false;
function startLocation() {
  if (!navigator.geolocation) { toast("Location not supported"); return; }
  navigator.geolocation.watchPosition(pos => {
    lastPos = pos;
    const { latitude, longitude, accuracy } = pos.coords;
    const ll = [latitude, longitude];
    if (!userMarker) {
      // Faint, non-interactive, and drawn as vectors (overlay pane) so they sit
      // BELOW the sign markers — taps fall through to a sign circle underneath.
      accuracyCircle = L.circle(ll, { radius: accuracy, color: "#1e88ff", weight: 1, opacity: 0.25, fillColor: "#1e88ff", fillOpacity: 0.06, interactive: false, className: "user-loc" }).addTo(map);
      userMarker = L.circleMarker(ll, { radius: 15, color: "#ffffff", weight: 3, opacity: 1, fillColor: "#1e88ff", fillOpacity: 1, interactive: false, className: "user-loc" }).addTo(map);
    } else {
      userMarker.setLatLng(ll); accuracyCircle.setLatLng(ll).setRadius(accuracy);
    }
    if (!followedOnce) { followedOnce = true; map.setView(ll, 18); }
  }, err => {
    toast(err.code === 1 ? "Location permission denied" : "Waiting for GPS…");
  }, { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 });
}
document.getElementById("locateBtn").onclick = () => {
  if (lastPos) map.setView([lastPos.coords.latitude, lastPos.coords.longitude], 18);
  else { toast("Getting your location…"); startLocation(); }
};

// ---- Compass heading (best effort, iOS needs a permission gesture) ----------
let lastHeading = null, headingReady = false;
function onOrient(e) {
  const h = (e.webkitCompassHeading != null) ? e.webkitCompassHeading
          : (e.alpha != null && e.absolute) ? (360 - e.alpha) : null;
  if (h != null) lastHeading = Math.round(h);
}
// Ask for compass permission once (iOS needs a user gesture) and keep listening.
async function enableHeading() {
  if (headingReady) return;
  try {
    const D = window.DeviceOrientationEvent;
    if (D && typeof D.requestPermission === "function") {
      if (await D.requestPermission() !== "granted") return;
    }
    // Android exposes the absolute (compass) heading via deviceorientationabsolute;
    // iOS exposes it on plain deviceorientation as webkitCompassHeading.
    window.addEventListener("deviceorientationabsolute", onOrient, true);
    window.addEventListener("deviceorientation", onOrient, true);
    headingReady = true;
  } catch (e) {}
}

// ---- Capture a sign ---------------------------------------------------------
const cameraInput = document.getElementById("cameraInput");
document.getElementById("captureBtn").onclick = async () => {
  await enableHeading();         // ask once, on a user gesture
  if (!lastPos) startLocation(); // make sure GPS is warming up
  cameraInput.value = "";
  cameraInput.click();
};
cameraInput.onchange = async () => {
  const file = cameraInput.files[0];
  if (!file) return;
  // Capture the freshest GPS fix at the moment of the photo.
  let pos = lastPos;
  try { pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 12000, maximumAge: 0 })); }
  catch (e) { /* fall back to last watch position */ }
  if (!pos) { toast("No GPS fix — sign not added"); return; }
  const image = await downscale(file);   // 720px thumbnail, for display
  const acc = Math.round(pos.coords.accuracy);
  // Staleness of the fix: how old the GPS reading was when the photo was taken.
  const lag = pos.timestamp ? Math.max(0, Math.round((Date.now() - pos.timestamp) / 1000)) : null;
  const rec = {
    id: "cap-" + Date.now(),
    name: "capture " + new Date().toLocaleString(),
    lat: pos.coords.latitude, lon: pos.coords.longitude,
    heading: lastHeading, object_type: "unknown",
    lag_seconds: lag, accuracy_m: acc,
    reliability: acc <= ACC_GOOD_M ? "good" : acc <= ACC_SUSPECT_M ? "suspect" : "bad",
    state: "todo", source: "capture", created: new Date().toISOString(),
    image,                               // display thumbnail (was missing → broken image)
    original: file,                      // full-res photo kept as a Blob for backup
    originalType: file.type || "image/jpeg",
  };
  await dbPut(rec);
  const g = indexSign(rec);
  refreshGroup(g);
  hideBanner();
  map.setView(g.latlng, Math.max(map.getZoom(), 18));
  g.marker.openPopup();
  toast("Sign added (±" + acc + " m)");
};
function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(r.error);
    r.readAsDataURL(file);
  });
}
// Downscale a captured photo to a JPEG data URI. Uses an <img> + canvas (works on
// iOS Safari and HEIC, unlike createImageBitmap). If anything fails, falls back to
// storing the original photo so the image is never lost.
function downscale(file) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.decoding = "async";
    img.onload = () => {
      try {
        const scale = Math.min(1, THUMB_WIDTH / img.naturalWidth);
        const w = Math.max(1, Math.round(img.naturalWidth * scale));
        const h = Math.max(1, Math.round(img.naturalHeight * scale));
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const out = canvas.toDataURL("image/jpeg", THUMB_QUALITY);
        URL.revokeObjectURL(url);
        if (out && out.length > 12) resolve(out);   // "data:," means encode failed
        else fileToDataURL(file).then(resolve);
      } catch (e) { URL.revokeObjectURL(url); fileToDataURL(file).then(resolve); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); fileToDataURL(file).then(resolve); };
    img.src = url;
  });
}

// ---- Export / Import backup -------------------------------------------------
// Backup = a .zip: original photos as real image files under images/, plus a
// metadata.json holding coords/states and the display thumbnails. This scales to
// thousands of signs (a single giant JSON would crash the tab).
function extFor(type) {
  if (!type) return "jpg";
  if (type.includes("png")) return "png";
  if (type.includes("heic") || type.includes("heif")) return "heic";
  return "jpg";
}
async function exportBackup() {
  const signs = await dbGetAll();
  if (!signs.length) { toast("Nothing to export yet"); return; }
  if (typeof JSZip === "undefined") { toast("Backup needs internet (zip library)"); return; }
  toast("Preparing backup…");
  const zip = new JSZip();
  const imgs = zip.folder("images");
  const meta = [];
  for (const s of signs) {
    const { original, originalType, ...rest } = s;   // drop the heavy blob from metadata
    let imageFile = null;
    if (original) { imageFile = s.id + "." + extFor(originalType); imgs.file(imageFile, original); }
    meta.push({ ...rest, imageFile });
  }
  zip.file("metadata.json", JSON.stringify({ version: 2, kind: "sign-inventory-backup", exported: new Date().toISOString(), signs: meta }));
  const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE", compressionOptions: { level: 1 } });
  await deliver(blob, "sign_inventory_" + new Date().toISOString().slice(0, 10) + ".zip", "application/zip");
  toast(signs.length + " signs exported");
}
// Prefer the iOS share sheet (reliable in standalone PWAs); fall back to download.
async function deliver(blob, name, type) {
  const file = new File([blob], name, { type });
  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    // Share ONLY the file — passing title/text makes iOS save an extra .txt alongside it.
    try { await navigator.share({ files: [file] }); return; }
    catch (e) { if (e.name === "AbortError") return; }   // user cancelled — don't double-deliver
  }
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 10000);
}
const importInput = document.getElementById("importInput");
function pickImport() { importInput.value = ""; importInput.click(); }
importInput.onchange = async () => {
  const file = importInput.files[0]; if (!file) return;
  try {
    let signs;
    if (/\.zip$/i.test(file.name) || file.type === "application/zip") {
      if (typeof JSZip === "undefined") { toast("Import needs internet (zip library)"); return; }
      const zip = await JSZip.loadAsync(file);
      const metaFile = zip.file("metadata.json");
      if (!metaFile) throw new Error("no metadata.json");
      const data = JSON.parse(await metaFile.async("string"));
      signs = data.signs || data;
      for (const s of signs) {            // reattach originals as blobs
        if (s.imageFile) {
          const f = zip.file("images/" + s.imageFile);
          if (f) { s.original = await f.async("blob"); s.originalType = s.original.type || "image/jpeg"; }
          delete s.imageFile;
        }
      }
    } else {                              // plain JSON (e.g. seed.json)
      const data = JSON.parse(await file.text());
      signs = Array.isArray(data) ? data : data.signs;
    }
    if (!Array.isArray(signs)) throw new Error("no signs array");
    await dbPutMany(signs);
    signs.forEach(indexSign);
    applyFilter();
    if (markerLayer.getLayers().length) map.fitBounds(markerLayer.getBounds().pad(0.2));
    hideBanner();
    toast("Imported " + signs.length + " signs");
  } catch (e) { toast("Could not read that file"); }
};
// Wipe ALL signs from this device (import merges, so use this for a clean slate).
async function clearData() {
  const n = (await dbGetAll()).length;
  if (!n) { toast("Nothing to clear"); return; }
  if (!confirm("Delete all " + n + " signs on this device? Export a backup first if unsure — this cannot be undone.")) return;
  await new Promise((res, rej) => { const r = tx("readwrite").clear(); r.onsuccess = res; r.onerror = () => rej(r.error); });
  markerLayer.clearLayers();
  for (const k in groups) delete groups[k];
  for (const k in signsById) delete signsById[k];
  for (const k in groupOfId) delete groupOfId[k];
  map.closePopup();
  showBanner("All signs cleared. Import a backup to restore.");
  toast("Cleared " + n + " signs");
}

// ---- Small UI helpers -------------------------------------------------------
let toastTimer;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}
function showBanner(msg) { const b = document.getElementById("banner"); if (msg) document.getElementById("bannerText").textContent = msg; b.style.display = "flex"; }
function hideBanner() { document.getElementById("banner").style.display = "none"; }

document.body.appendChild(helpOverlay);
function showHelp() { helpOverlay.classList.add("open"); }
function hideHelp() { helpOverlay.classList.remove("open"); }
document.addEventListener("keydown", e => { if (e.key === "Escape") hideHelp(); });

// ---- Boot -------------------------------------------------------------------
(async function init() {
  try { if (navigator.storage && navigator.storage.persist) await navigator.storage.persist(); } catch (e) {}
  db = await openDB();
  const signs = await dbGetAll();
  signs.forEach(indexSign);
  applyFilter();
  if (signs.length) { if (markerLayer.getLayers().length) map.fitBounds(markerLayer.getBounds().pad(0.2)); }
  else showBanner("No signs yet. Import your seed file to get started.");
  startLocation();
})();
</script>
